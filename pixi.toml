[workspace]
authors = ["Toby Driscoll <driscoll@udel.edu>"]
channels = ["conda-forge"]
name = "fnc"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
separate = { cmd = "julia _scripts/separator.jl", description = "Regenerate standalone language versions from source" }
verify = { cmd = "julia _scripts/verify.jl", description = "Compare separated versions against source for structural consistency" }
build = { cmd = "bash _scripts/build-all.sh", description = "Build all sites and assemble _site/" }
deploy = { cmd = "bash _scripts/deploy.sh", description = "Deploy _site/ to gh-pages branch" }
release = { cmd = "bash _scripts/release.sh", description = "Build, deploy, and tag a release (pass VERSION as arg)" }

[dependencies]
python = ">=3.11,<3.13"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.2,<3"
matplotlib = ">=3.10.8,<4"
networkx = ">=3.6.1,<4"
prettytable = ">=3.17.0,<4"
jupyter = ">=1.1.1,<2"
jupyterlab = ">=4.5.5,<5"
ipykernel = ">=7.2.0,<8"
scikit-image = ">=0.26.0,<0.27"
mystmd = ">=1.9.1,<2"

[pypi-dependencies]
ghp-import = ">=2.1.0, <3"
fncbook = ">=0.1.4, <0.2"
rogues = ">=1.0.1, <2"
jupyter-matlab-proxy = ">=0.19.0, <0.20"
